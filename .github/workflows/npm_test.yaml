name: run-npm-test
run-name: test started by ${{ github.actor }}
on:
  push
  pull_request:
    # Sequence of patterns matched against refs/heads
    branches:
      - main

steps:
- uses: actions/checkout@v5
- name: Use Node.js
  uses: actions/setup-node@v4
  with:
    node-version: '25.x'
- run: npm install
- run: npm run build --if-present
- run: npm test
