name: run-npm-test
run-name: test started by ${{ github.actor }}
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.x'
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test
